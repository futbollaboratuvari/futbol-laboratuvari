name: Relaxed analysis

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  relaxed-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/robot-threshold-patch.js
      - run: node scripts/update-analysis-report.js
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update relaxed robot analysis outputs"
          file_pattern: data/*.json outputs/*.md
