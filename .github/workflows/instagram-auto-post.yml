name: Instagram Auto Post

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Instagram'a paylaşmadan sadece test et"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "17 10 * * *"
      timezone: "Europe/Istanbul"
    - cron: "17 16 * * *"
      timezone: "Europe/Istanbul"
    - cron: "17 21 * * *"
      timezone: "Europe/Istanbul"

concurrency:
  group: instagram-auto-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  instagram-auto-post:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Istanbul
      SITE_URL: ${{ secrets.SITE_URL }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      META_GRAPH_API_VERSION: ${{ vars.META_GRAPH_API_VERSION || 'v23.0' }}
      INSTAGRAM_DAILY_LIMIT: "3"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Instagram robot
        id: instagram_robot
        continue-on-error: true
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY_RUN" = "true" ]; then
            python scripts/instagram_publish.py --dry-run
          else
            python scripts/instagram_publish.py
          fi

      - name: Commit Instagram log changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/instagram_posts.json
          if git diff --cached --quiet; then
            echo "Log değişikliği yok."
          else
            git commit -m "Instagram robot log güncellendi"
            git push
          fi

      - name: Fail job if robot failed
        if: steps.instagram_robot.outcome == 'failure'
        run: exit 1
