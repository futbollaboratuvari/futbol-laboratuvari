name: Update fixtures and High Value Engine

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ops/main-run.txt"

permissions:
  contents: write

concurrency:
  group: update-fixtures-live-data
  cancel-in-progress: true

jobs:
  update-fixtures:
    runs-on: ubuntu-latest
    env:
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      API_FOOTBALL_KEY2: ${{ secrets.API_FOOTBALL_KEY2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python robot dependencies
        working-directory: bu-klas-r-i-in-basit
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium

      - name: Update Mackolik fixture list
        continue-on-error: true
        run: node scripts/update-fixtures.js

      - name: Run full Python robot
        working-directory: bu-klas-r-i-in-basit
        continue-on-error: true
        run: python src/robot.py

      - name: Import robot raw pool into site data
        continue-on-error: true
        run: node scripts/import-robot-raw-pool.js

      - name: Validate High Value Coupon Engine
        run: node -e "require('./scripts/robot-exact-scoring'); console.log('High Value Coupon Engine ready')"

      - name: Build High Value Coupon Engine report
        continue-on-error: true
        run: node scripts/update-analysis-report.js

      - name: Build band signals
        continue-on-error: true
        run: node scripts/band-lite.js

      - name: Export live JSON for site
        run: node scripts/export-high-value-json.js

      - name: Commit and push High Value Engine outputs
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add -A data outputs bu-klas-r-i-in-basit/data bu-klas-r-i-in-basit/outputs || true
          if git diff --cached --quiet; then
            echo "No output changes to commit"
            exit 0
          fi
          git commit -m "Update fixtures and High Value Coupon Engine"
          git push origin HEAD:main || true
