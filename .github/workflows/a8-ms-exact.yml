name: A8 MS Exact

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-ms:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: |
          $p = "scripts/robot-exact-scoring.js"
          $t = Get-Content $p -Raw -Encoding UTF8
          if (-not $t.Contains('ms1: { label: "MS 1"')) {
            $ms = '  ms1: { label: "MS 1", keys: ["ms1", "homeWin", "home_win", "macSonucu1", "ms_1"], minOdd: 1.25, maxOdd: 6.50, scores: ["1-0", "2-0", "2-1"] },`r`n  msx: { label: "MS X", keys: ["msx", "draw", "beraberlik", "macSonucuX", "ms_x"], minOdd: 2.20, maxOdd: 5.80, scores: ["0-0", "1-1", "2-2"] },`r`n  ms2: { label: "MS 2", keys: ["ms2", "awayWin", "away_win", "macSonucu2", "ms_2"], minOdd: 1.25, maxOdd: 7.50, scores: ["0-1", "0-2", "1-2"] },`r`n'
            $t = $t.Replace('const marketRules = {', 'const marketRules = {`r`n' + $ms)
          }
          Set-Content $p $t -Encoding UTF8
          node --check $p
      - shell: pwsh
        run: |
          git config user.name "futbollaboratuvari-bot"
          git config user.email "actions@github.com"
          git add scripts/robot-exact-scoring.js
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) { git commit -m "A8 MS exact secenekleri"; git push }
