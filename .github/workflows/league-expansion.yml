name: Update league expansion

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ops/league-expansion-run.txt"

permissions:
  contents: write

concurrency:
  group: update-league-expansion
  cancel-in-progress: true

jobs:
  update-league-expansion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build league expansion signals
        run: node scripts/league-expansion-lite.js

      - name: Commit league expansion outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update league expansion signals"
          file_pattern: data/league-expansion-signals.json data/archive/*-league-expansion.json
