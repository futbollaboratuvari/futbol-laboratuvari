name: Live Data Trigger

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches:
      - main
    paths:
      - "ops/live-data-trigger.txt"

permissions:
  contents: write

concurrency:
  group: live-data-trigger
  cancel-in-progress: true

jobs:
  live-data:
    runs-on: ubuntu-latest
    env:
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      API_FOOTBALL_KEY2: ${{ secrets.API_FOOTBALL_KEY2 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python robot dependencies
        working-directory: bu-klas-r-i-in-basit
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium

      - name: Update fixtures from site source
        continue-on-error: true
        run: node scripts/update-fixtures.js

      - name: Run Python robot source collector
        working-directory: bu-klas-r-i-in-basit
        continue-on-error: true
        run: python src/robot.py

      - name: Import robot raw pool into site data
        continue-on-error: true
        run: node scripts/import-robot-raw-pool.js

      - name: Build detail market candidates
        continue-on-error: true
        run: node scripts/raw-block-lite.js

      - name: Export High Value JSON
        continue-on-error: true
        run: node scripts/export-high-value-json.js

      - name: Apply focused market list
        continue-on-error: true
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const read = (p, f) => { try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return f; } };
          const write = (p, v) => fs.writeFileSync(p, JSON.stringify(v, null, 2) + '\n', 'utf8');
          const focus = read('data/focused_markets.json', { focused_markets: [] }).focused_markets || [];
          const raw = read('data/ham_mac_havuzu.json', {});
          raw.engine_rules = raw.engine_rules || {};
          raw.engine_rules.focused_markets = Array.from(new Set([...(raw.engine_rules.focused_markets || []), ...focus]));
          raw.focused_market_count = raw.engine_rules.focused_markets.length;
          write('data/ham_mac_havuzu.json', raw);
          const analysis = read('data/analiz_sonuclari.json', { active_items: [], completed_items: [] });
          analysis.focused_markets = raw.engine_rules.focused_markets;
          analysis.focused_market_note = 'First half result, second half result and HT/FT markets are focus markets.';
          write('data/analiz_sonuclari.json', analysis);
          console.log('Focused markets applied:', raw.focused_market_count);
          NODE

      - name: Ensure live json
        run: node scripts/ensure-live-json.js

      - name: Commit data outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add -A data outputs bu-klas-r-i-in-basit/data bu-klas-r-i-in-basit/outputs || true
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "Live data outputs updated"
          git push origin HEAD:main || true
