name: Update league structure

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ops/league-structure-run.txt"

permissions:
  contents: write

concurrency:
  group: update-league-structure
  cancel-in-progress: true

jobs:
  update-league-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build league structure signals
        run: node scripts/league-structure-lite.js

      - name: Commit league structure outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update league structure signals"
          file_pattern: data/league-structure-signals.json data/archive/*-league-structure.json
