name: A8 MS Coupon

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/a8-ms-coupon.yml

permissions:
  contents: write

jobs:
  add-ms:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: |
          $p = "scripts/robot-coupon-engine.js"
          $t = Get-Content $p -Raw -Encoding UTF8
          if (-not $t.Contains('ms1: {')) {
            $ms = @'
  ms1: {
    label: "MS 1",
    keys: ["ms1", "homeWin", "home_win", "macSonucu1", "ms_1"],
    minOdd: 1.25,
    maxOdd: 6.50,
    boost: 8,
    riskAdd: 5,
    scores: ["1-0", "2-0", "2-1"],
    signals: ["Maç sonucu 1 seçeneği kontrol edildi"],
  },
  msx: {
    label: "MS X",
    keys: ["msx", "draw", "beraberlik", "macSonucuX", "ms_x"],
    minOdd: 2.20,
    maxOdd: 5.80,
    boost: 10,
    riskAdd: 9,
    scores: ["0-0", "1-1", "2-2"],
    signals: ["Maç sonucu X seçeneği kontrol edildi"],
  },
  ms2: {
    label: "MS 2",
    keys: ["ms2", "awayWin", "away_win", "macSonucu2", "ms_2"],
    minOdd: 1.25,
    maxOdd: 7.50,
    boost: 9,
    riskAdd: 7,
    scores: ["0-1", "0-2", "1-2"],
    signals: ["Maç sonucu 2 seçeneği kontrol edildi"],
  },
'@
            $t = $t.Replace('const marketRules = {', "const marketRules = {`r`n" + $ms)
          }
          Set-Content $p $t -Encoding UTF8
          node --check $p
      - shell: pwsh
        run: |
          git config user.name "futbollaboratuvari-bot"
          git config user.email "actions@github.com"
          git add scripts/robot-coupon-engine.js
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) { git commit -m "A8 MS coupon secenekleri"; git push }

# trigger: ms-coupon
