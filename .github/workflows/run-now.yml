name: Run robot now

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ops/run-now.txt"

permissions:
  contents: write

concurrency:
  group: run-robot-now
  cancel-in-progress: true

jobs:
  run-robot-now:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: bu-klas-r-i-in-basit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium

      - name: Update fixtures
        run: node scripts/update-fixtures.js

      - name: Run robot
        working-directory: bu-klas-r-i-in-basit
        continue-on-error: true
        run: python src/robot.py

      - name: Import robot raw pool
        run: node scripts/import-robot-raw-pool.js

      - name: Build analysis report
        run: node scripts/update-analysis-report.js

      - name: Export live JSON
        run: node scripts/export-high-value-json.js

      - name: Commit and push outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run robot and update live JSON outputs"
          file_pattern: data/*.json data/archive/*.json outputs/*.md bu-klas-r-i-in-basit/data/*.json bu-klas-r-i-in-basit/outputs/*.md
