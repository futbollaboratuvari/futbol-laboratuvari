name: Auto relaxed analysis

on:
  workflow_dispatch:
  push:
    paths:
      - "package.json"
      - "scripts/**"
      - ".github/workflows/auto-relaxed-analysis.yml"
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  auto-relaxed-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          npm run update:fixtures
          npm run update:analysis
          npm run export:live
          npm run build:live
          npm run sync:results
          npm run check:learning
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto live data and robot analysis update"
          file_pattern: data/*.json outputs/*.md
